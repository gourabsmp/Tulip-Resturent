<!DOCTYPE html>
<html>

<head>
	<title>Register | Tulip</title>
	<style>
		body {
			background: #111;
			color: white;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			font-family: 'Inter', sans-serif;
			margin: 0;
		}

		.form-box {
			background: #1a1a1a;
			padding: 40px;
			border-radius: 12px;
			text-align: center;
			width: 100%;
			max-width: 400px;
			border: 1px solid #333;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
		}

		h2 {
			color: #d4af37;
			font-family: 'Playfair Display', serif;
			margin-bottom: 20px;
			font-size: 2rem;
		}

		input {
			padding: 12px;
			width: 100%;
			margin-bottom: 20px;
			box-sizing: border-box;
			background: #222;
			border: 1px solid #444;
			color: white;
			border-radius: 6px;
		}

		input:focus {
			outline: none;
			border-color: #d4af37;
		}

		button {
			background: #d4af37;
			color: black;
			border: none;
			padding: 12px;
			width: 100%;
			cursor: pointer;
			font-weight: bold;
			border-radius: 6px;
			transition: 0.3s;
		}

		button:hover {
			background: #f2c94c;
			transform: translateY(-2px);
		}

		a {
			color: #888;
			text-decoration: none;
			font-size: 0.9rem;
			display: block;
			margin-top: 15px;
			transition: 0.3s;
		}

		a:hover {
			color: #d4af37;
		}
	</style>
</head>

<body>
	<div class="form-box">
		<h2>Create Account</h2>
		<form method="POST">
			<input type="text" name="name" placeholder="Full Name" required>
			<input type="email" name="email" placeholder="Email Address" required>
			<input type="password" name="password" placeholder="Create Password" required>
			<button type="submit">Sign Up</button>
		</form>
		<a href="/login">Already have an account? Login here.</a>
		<a href="/" style="margin-top: 30px;">← Back to Home</a>
	</div>
</body>

</html>
