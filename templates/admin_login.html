<!DOCTYPE html>
<html>

<head>
	<title>Admin Portal | Tulip</title>
	<style>
		body {
			background: #000;
			color: white;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			font-family: 'Inter', sans-serif;
			margin: 0;
		}

		.form-box {
			background: #111;
			padding: 50px;
			border-radius: 8px;
			text-align: center;
			border: 1px solid #333;
			width: 300px;
		}

		h2 {
			color: #e74c3c;
			margin-bottom: 20px;
			font-family: monospace;
		}

		input {
			padding: 12px;
			width: 100%;
			margin-bottom: 20px;
			box-sizing: border-box;
			background: #222;
			border: 1px solid #444;
			color: white;
		}

		button {
			background: #e74c3c;
			color: white;
			border: none;
			padding: 12px;
			width: 100%;
			cursor: pointer;
			font-weight: bold;
			letter-spacing: 1px;
		}
	</style>
</head>

<body>
	<div class="form-box">
		<h2>SECURE PORTAL</h2>
		<form method="POST">
			<input type="password" name="password" placeholder="Admin Passcode" required>
			<button type="submit">AUTHENTICATE</button>
		</form>
	</div>
</body>

</html>
